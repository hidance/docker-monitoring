events {}

http {
    upstream web_app {
        server my_web_app:5000; 
    }

    server {
        listen 80;

        location / {
            proxy_pass http://web_app;
        }

        # proxy for grafana
        location /grafana/ {
            proxy_pass http://grafana_cont:3000/;
            proxy_set_header Host $host;
        }

      
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;]
            deny all;
        }
    }
}
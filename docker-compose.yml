
services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus_cont
    restart: always
    ports:
      - '9090:9090'
    volumes:
      - 'prometheus_data:/prometheus'
      - './prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro'
    networks:
      - net01

  grafana:
    image: grafana/grafana
    container_name: grafana_cont
    restart: always
    environment:
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - '3000:3000'
    volumes:
      - 'grafana_data:/var/lib/grafana'
    networks:
      - net01
  node-exporter:
    image: prom/node-exporter
    container_name: node_exporter_cont
    restart: always
    pid: host 
    ports: 
      - '9100:9100'
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
      - '/:/rootfs:ro'
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - net01
  cadvisor:
    image: ghcr.io/google/cadvisor:0.55.1
    container_name: cadvisor_cont
    restart: unless-stopped
    ports: 
      - '8080:8080'
    privileged: true  
    volumes:
      - '/:/rootfs:ro'
      - '/var/run:/var/run:rw'
      - '/sys:/sys:ro'
      - '/var/lib/docker/:/var/lib/docker:ro'
    devices:
      - /dev/kmsg
    networks:
      - net01
    

networks:
 net01:
   driver: bridge


volumes:
  grafana_data:
  prometheus_data:


